    <main>
        <section class="apartado">
            <h1>Formulario de contacto</h1>
            <form class="formulario" action="index.php" method="POST">
                <label for="nom">Nombre completo:</label>
                <input type="text" id="nom" name="nombre" placeholder="Escribe tu nombre..." required>


                <label for="ema">Correo electronico:</label>
                <input type="email" id="ema" name="email" placeholder="ejemplo@correo.com" required>


                <label for="msg">Mensaje o consulta:</label>
                <textarea id="msg" name="mensaje" placeholder="¿En qué podemos ayudarte?" rows="4" required></textarea>


                <div class="encuesta">
                    <p>¿Cómo valoras nuestra iniciativa de reciclaje?</p>
                    <label><input type="radio" name="valoracion" value="muy_buena"> Muy buena</label><br>
                    <label><input type="radio" name="valoracion" value="buena"> Buena</label><br>
                    <label><input type="radio" name="valoracion" value="regular"> Regular</label>
                </div>


                <div class="encuesta">
                    <p>¿Deseas recibir noticias en tu email?</p>
                    <label><input type="checkbox" name="boletin" value="si"> Sí, deseo suscribirme</label>
                </div>
                <button type="submit" class="btn-verde">Enviar información</button>
            </form>
        </section>
    </main>
